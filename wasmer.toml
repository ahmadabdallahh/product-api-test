[package]
name = "product-api"
version = "1.0.0"
description = "Laravel Product API - RESTful API for managing products"
authors = ["Ahmad Abdallah"]

[build]
# Build command to install dependencies and prepare the application
command = """
composer install --no-dev --optimize-autoloader
php artisan config:cache
php artisan route:cache
php artisan view:cache
php artisan migrate --force
php artisan db:seed --force
"""

[deploy]
# Deployment configuration
start_command = "php artisan serve --host=0.0.0.0 --port=8080"
health_check_path = "/api/products"
health_check_interval = 30

[environment]
# Environment variables for production
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "https://products-api.wasmer.app/"
APP_NAME = "Laravel"
APP_LOCALE = "en"
APP_FALLBACK_LOCALE = "en"
APP_FAKER_LOCALE = "en_US"

# Database configuration
DB_CONNECTION = "mysql"
DB_HOST = "db.fr-pari1.bengt.wasmernet.com"
DB_PORT = "10272"
DB_DATABASE = "my_laravel_course"
DB_USERNAME = "fe2b2bc77c0a800057306ce9002a"
DB_PASSWORD = "069bfe2b-2bc7-7d3b-8000-ed2c93397a9a"

# Cache and session configuration
CACHE_DRIVER = "database"
SESSION_DRIVER = "database"
SESSION_LIFETIME = "120"
SESSION_ENCRYPT = "false"
QUEUE_CONNECTION = "database"

# Log configuration
LOG_CHANNEL = "stack"
LOG_LEVEL = "error"
LOG_DEPRECATIONS_CHANNEL = "null"

# Filesystem
FILESYSTEM_DISK = "local"

# Mail configuration (using log for production)
MAIL_MAILER = "log"
MAIL_HOST = "127.0.0.1"
MAIL_PORT = "2525"
MAIL_USERNAME = "null"
MAIL_PASSWORD = "null"
MAIL_FROM_ADDRESS = "hello@example.com"
MAIL_FROM_NAME = "${APP_NAME}"

# Redis configuration (if needed)
REDIS_CLIENT = "phpredis"
REDIS_HOST = "127.0.0.1"
REDIS_PASSWORD = "null"
REDIS_PORT = "6379"

# Security - Production APP_KEY
APP_KEY = "base64:U2FsdGVkX1+9J5G8mK2Q7R4nL6pF3tH8vY1wZ5cN7xA="

[filesystem]
# Files and directories to include in the deployment
include = [
    "app/",
    "bootstrap/",
    "config/",
    "database/",
    "public/",
    "resources/",
    "routes/",
    "storage/",
    "vendor/",
    "composer.json",
    "composer.lock",
    "artisan",
    ".env"
]

# Files and directories to exclude
exclude = [
    "node_modules/",
    ".git/",
    "tests/",
    "phpunit.xml",
    "README.md",
    ".env.example"
]

[runtime]
# Runtime configuration
memory_limit = "256M"
max_execution_time = "300"
upload_max_filesize = "10M"
post_max_size = "10M"

[domains]
# Custom domain configuration (if applicable)
# main = "product-api.yourdomain.com"

[scaling]
# Auto-scaling configuration
min_instances = 1
max_instances = 5
cpu_threshold = 70
memory_threshold = 80

[monitoring]
# Monitoring and logging
enable_access_logs = true
enable_error_logs = true
log_retention_days = 30
