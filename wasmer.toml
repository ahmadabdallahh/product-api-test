[package]
name = "product-api"
version = "1.0.0"
description = "Laravel Product API - RESTful API for managing products"
authors = ["Ahmad Abdallah"]

[build]
# Build command to install dependencies and prepare the application
command = """
composer install --no-dev --optimize-autoloader
php artisan config:cache
php artisan route:cache
php artisan view:cache
"""

[deploy]
# Deployment configuration
start_command = "php artisan serve --host=0.0.0.0 --port=8080"
health_check_path = "/api/products"
health_check_interval = 30

[environment]
# Environment variables for production
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "https://product-api.wasmer.app"

# Database configuration (adjust as needed)
DB_CONNECTION = "mysql"
DB_HOST = "${DB_HOST}"
DB_PORT = "${DB_PORT}"
DB_DATABASE = "${DB_DATABASE}"
DB_USERNAME = "${DB_USERNAME}"
DB_PASSWORD = "${DB_PASSWORD}"

# Cache and session configuration
CACHE_DRIVER = "redis"
SESSION_DRIVER = "redis"
QUEUE_CONNECTION = "redis"

# Log configuration
LOG_CHANNEL = "stack"
LOG_LEVEL = "error"

# Security
APP_KEY = "${APP_KEY}"

[filesystem]
# Files and directories to include in the deployment
include = [
    "app/",
    "bootstrap/",
    "config/",
    "database/",
    "public/",
    "resources/",
    "routes/",
    "storage/",
    "vendor/",
    "composer.json",
    "composer.lock",
    "artisan",
    ".env"
]

# Files and directories to exclude
exclude = [
    "node_modules/",
    ".git/",
    "tests/",
    "phpunit.xml",
    "README.md",
    ".env.example"
]

[runtime]
# Runtime configuration
memory_limit = "256M"
max_execution_time = "300"
upload_max_filesize = "10M"
post_max_size = "10M"

[domains]
# Custom domain configuration (if applicable)
# main = "product-api.yourdomain.com"

[scaling]
# Auto-scaling configuration
min_instances = 1
max_instances = 5
cpu_threshold = 70
memory_threshold = 80

[monitoring]
# Monitoring and logging
enable_access_logs = true
enable_error_logs = true
log_retention_days = 30
